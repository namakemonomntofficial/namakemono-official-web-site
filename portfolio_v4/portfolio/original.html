<head>
  <meta charset="UTF-8">

  <title>Original — 怠けモノ Official site</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    :root { --accent: var(--c-red); --accent-dim: var(--c-red-dim); }

    .world-hero {
      background: var(--c-red-dim);
      border: 0.5px solid hsl(300,35%,20%);
      border-radius: var(--radius-lg);
      padding: 28px 28px;
      margin-bottom: 24px;
      position: relative;
      overflow: hidden;
    }
    .world-hero::before {
      content: '◆';
      position: absolute;
      right: 24px; top: 50%;
      transform: translateY(-50%);
      font-size: 64px;
      color: hsl(300,30%,18%);
    }
    .world-hero-tag { font-size: 10px; color: var(--c-red); letter-spacing: 0.16em; text-transform: uppercase; margin-bottom: 8px; }
    .world-hero-title { font-family: var(--font); font-size: 22px; font-weight: 800; color: #fff; margin-bottom: 8px; }
    .world-hero-desc { font-size: 12px; color: var(--text2); line-height: 1.7; max-width: 380px; }

    .content-cards { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
    .oc-card {
      background: var(--bg2);
      border: 0.5px solid var(--border);
      border-radius: var(--radius-lg);
      overflow: hidden;
      text-decoration: none;
      display: block;
      transition: border-color 0.2s;
    }
    .oc-card:hover { border-color: var(--c-red); }
    .oc-header {
      padding: 16px 18px 12px;
      border-bottom: 0.5px solid var(--border);
    }
    .oc-icon { font-size: 20px; margin-bottom: 8px; }
    .oc-title { font-size: 14px; font-weight: 500; color: #ddd; margin-bottom: 4px; }
    .oc-sub { font-size: 11px; color: var(--text2); line-height: 1.6; }
    .oc-footer {
      padding: 8px 18px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .oc-label { font-size: 10px; color: var(--text3); }
    .oc-arrow { font-size: 12px; color: var(--c-red); }

    .lang-showcase {
      background: var(--bg2);
      border: 0.5px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 20px 22px;
    }
    .lang-sample { font-family: var(--font); font-size: 18px; color: var(--c-red); margin: 12px 0 6px; letter-spacing: 0.08em; }
    .lang-trans { font-size: 12px; color: var(--text2); }
    .lang-phonetic { font-size: 11px; color: var(--text3); margin-top: 2px; }

    @media (max-width: 640px) {
      .content-cards { grid-template-columns: 1fr; }
    }
  </style>
</head>
